services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: financial_simulator
    ports:
      - "5433:5432"   # host 5433 -> container 5432 (avoid clashing with a local Postgres)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/financial_simulator
      JWT_SECRET: change-me-in-production
      CORS_ORIGINS: http://localhost:5173
      CONTENT_DIR: /content
    volumes:
      - ./backend:/app
      - /app/.venv          # keep the image's virtualenv (don't shadow with host)
      - ./content:/content
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules   # keep installed node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
