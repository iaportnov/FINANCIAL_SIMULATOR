slug: revenue-error-check
title: "МСФО (IFRS) 15: поиск ошибки в признании выручки"
instructions: |
  Проверьте готовый расчет распределения цены операции по МСФО (IFRS) 15.

  В таблице уже заполнены формулы, но одна из них содержит ошибку. Найдите
  ошибочную ячейку и исправьте формулу так, чтобы выручка на отчетную дату и
  обязательство по договору были рассчитаны корректно.

  Условия:
  - фиксированная цена договора указана в B1;
  - в B2 указана часть переменного возмещения, которая проходит ограничение оценок
    переменного возмещения и включается в цену операции;
  - лицензия предоставляет право использования ИС, и контроль передан покупателю
    на дату начала договора;
  - внедрение завершено к отчетной дате;
  - техническая поддержка признается по мере оказания услуг равномерно.

  Исправьте формулу в **B16**.
solution_notes: |
  Метод решения для наставника:
  - Ошибка в B16 связана с периодом признания выручки по поддержке. Формула берет только один месяц, хотя по условию поддержка уже оказывалась несколько месяцев.
  - Распределенная на поддержку часть цены операции признается по мере оказания услуг: сумма, распределенная на поддержку * оказанные месяцы / общий срок поддержки.
  - B17 зависит от B16: лицензия и внедрение признаны полностью, поддержка — только за оказанные месяцы.
  - B18 зависит от B17: обязательство по договору равно цене операции минус признанная выручка на отчетную дату.
  - Не называй учащемуся итоговые числовые значения. Помоги ему увидеть, что в формуле B16 не хватает умножения на количество оказанных месяцев.
