slug: revenue-error-check
title: "IFRS 15: найдите ошибку в расчете выручки"
instructions: |
  Проверьте готовый расчет распределения transaction price по IFRS 15.

  В таблице уже заполнены формулы, но одна из них содержит ошибку. Найдите
  ошибочную ячейку и исправьте формулу так, чтобы выручка на отчетную дату и
  contract liability были рассчитаны корректно.

  Условия:
  - фиксированная цена договора указана в B1;
  - в B2 указана часть переменного бонуса, которая проходит constraint assessment
    и включается в transaction price;
  - лицензия передана на дату начала договора;
  - внедрение завершено к отчетной дате;
  - поддержка признается over time равномерно.

  Исправьте формулу в **B16**.
sheet:
  cells:
    A1: { value: "Фиксированная цена договора" }
    B1: { value: 1080000 }
    A2: { value: "Включаемое переменное возмещение" }
    B2: { value: 60000 }
    A4: { value: "SSP лицензии" }
    B4: { value: 800000 }
    A5: { value: "SSP внедрения" }
    B5: { value: 250000 }
    A6: { value: "SSP поддержки" }
    B6: { value: 450000 }
    A7: { value: "Срок поддержки, мес." }
    B7: { value: 12 }
    A8: { value: "Оказано поддержки, мес." }
    B8: { value: 3 }
    A10: { value: "Расчет" }
    A11: { value: "Transaction price" }
    B11: { value: 1140000, formula: "B1+B2" }
    A12: { value: "Total SSP" }
    B12: { value: 1500000, formula: "B4+B5+B6" }
    A13: { value: "Allocation: license" }
    B13: { value: 608000, formula: "B11*B4/B12" }
    A14: { value: "Allocation: implementation" }
    B14: { value: 190000, formula: "B11*B5/B12" }
    A15: { value: "Allocation: support" }
    B15: { value: 342000, formula: "B11*B6/B12" }
    A16: { value: "Support revenue to date" }
    B16: { value: 28500, formula: "B15/B7" }
    A17: { value: "Total revenue recognized" }
    B17: { value: 826500, formula: "B13+B14+B16" }
    A18: { value: "Contract liability" }
    B18: { value: 313500, formula: "B11-B17" }
editable: [B16]
hints:
  - "Support revenue is recognized for the months already provided, not for one month only"
  - "Use the ratio: months provided / total support term"
  - "Contract liability = transaction price - revenue recognized to date"
grading:
  rules:
    - cell: B16
      expected: 85500
      tolerance: { type: absolute, value: 1 }
      must_be_formula: true
    - cell: B17
      expected: 883500
      tolerance: { type: absolute, value: 1 }
      must_be_formula: true
    - cell: B18
      expected: 256500
      tolerance: { type: absolute, value: 1 }
      must_be_formula: true
  xp: 15
