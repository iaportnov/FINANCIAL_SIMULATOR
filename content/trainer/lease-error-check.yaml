slug: lease-error-check
title: "МСФО (IFRS) 16: поиск ошибки в арендном обязательстве"
instructions: |
  Проверьте готовый расчет первоначальной оценки аренды у арендатора по МСФО (IFRS) 16.

  В таблице уже заполнены формулы, но одна из них содержит методологическую
  ошибку. Найдите ошибочную ячейку и исправьте формулу так, чтобы расчет
  краткосрочной и долгосрочной частей арендного обязательства стал корректным.

  Условия:
  - ежегодный арендный платеж производится в конце каждого года;
  - процентная ставка, заложенная в договоре аренды, надежно не определяется,
    поэтому используется ставка привлечения дополнительных заемных средств арендатора;
  - неарендных компонентов в платеже нет;
  - стимулирующий платеж по аренде получен на дату начала аренды и в этой
    задаче уменьшает первоначальную стоимость актива в форме права пользования,
    но не уменьшает приведенную стоимость будущих арендных платежей.

  Исправьте формулу в **B10**.
solution_notes: |
  Метод решения для наставника:
  - Ошибка находится в логике краткосрочной части арендного обязательства: это не платеж минус вся первоначальная приведенная стоимость.
  - Сначала нужно взять процент за первый год: начальное арендное обязательство * ставка привлечения дополнительных заемных средств арендатора.
  - Краткосрочная часть в этой задаче — это погашение основного долга ближайшим платежом: ежегодный арендный платеж минус процент за первый год.
  - Долгосрочная часть должна быть остатком первоначального арендного обязательства после выделения краткосрочной части.
  - Актив в форме права пользования в этой задаче уже собран от первоначального арендного обязательства, первоначальных прямых затрат, оценки демонтажа/восстановления и стимулирующего платежа.
  - Не называй учащемуся итоговые числовые значения. Подводи его к тому, что знак и база расчета в B10 неверные.
