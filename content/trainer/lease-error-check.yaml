slug: lease-error-check
title: "IFRS 16: найдите ошибку в расчете аренды"
instructions: |
  Проверьте готовый расчет первоначального признания аренды по IFRS 16.

  В таблице уже заполнены формулы, но одна из них содержит методологическую
  ошибку. Найдите ошибочную ячейку и исправьте формулу так, чтобы расчет
  текущей и долгосрочной частей lease liability стал корректным.

  Условия:
  - ежегодный платеж производится в конце года;
  - implicit rate надежно не определяется, поэтому используется incremental borrowing rate;
  - сервисных компонентов в платеже нет;
  - lease incentive уменьшает ROU asset, но не lease liability.

  Исправьте формулу в **B10**.
sheet:
  cells:
    A1: { value: "Ежегодный платеж, конец года" }
    B1: { value: 1200000 }
    A2: { value: "Срок аренды, лет" }
    B2: { value: 4 }
    A3: { value: "Incremental borrowing rate" }
    B3: { value: 0.10 }
    A4: { value: "Первоначальные прямые затраты" }
    B4: { value: 80000 }
    A5: { value: "PV демонтажа/восстановления" }
    B5: { value: 150000 }
    A6: { value: "Lease incentive" }
    B6: { value: 100000 }
    A8: { value: "Расчет" }
    A9: { value: "Initial lease liability" }
    B9: { value: 3803838.54, formula: "B1*(1-(1+B3)^(-B2))/B3" }
    A10: { value: "Current portion" }
    B10: { value: -2603838.54, formula: "B1-B9" }
    A11: { value: "Non-current portion" }
    B11: { value: 6407677.08, formula: "B9-B10" }
    A12: { value: "Initial ROU asset" }
    B12: { value: 3933838.54, formula: "B9+B4+B5-B6" }
editable: [B10]
hints:
  - "Current portion is the first-year principal repayment, not payment minus the full liability"
  - "First-year interest = opening lease liability * incremental borrowing rate"
  - "Current portion = cash payment - first-year interest"
grading:
  rules:
    - cell: B10
      expected: 819616.15
      tolerance: { type: relative, value: 0.01 }
      must_be_formula: true
    - cell: B11
      expected: 2984222.39
      tolerance: { type: relative, value: 0.01 }
      must_be_formula: true
    - cell: B12
      expected: 3933838.54
      tolerance: { type: relative, value: 0.01 }
      must_be_formula: true
  xp: 15
