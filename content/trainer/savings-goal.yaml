slug: savings-goal
title: "МСФО (IFRS) 15: распределение цены операции"
instructions: |
  Подготовьте расчет по договору с тремя обязанностями к исполнению: лицензия,
  внедрение и техническая поддержка.

  Условия:
  - фиксированная цена договора указана в B1;
  - в B2 указана часть переменного возмещения, которая проходит ограничение оценок
    переменного возмещения и включается в цену операции;
  - лицензия предоставляет право использования ИС, и контроль передан покупателю
    на дату начала договора;
  - внедрение завершено к отчетной дате;
  - техническая поддержка признается по мере оказания услуг равномерно.

  Заполните формулами **B11:B18**:
  - цену операции;
  - сумму цен обособленной продажи;
  - распределение цены операции на лицензию, внедрение и поддержку;
  - выручку по поддержке на отчетную дату;
  - общую признанную выручку;
  - обязательство по договору на отчетную дату.
solution_notes: |
  Метод решения для наставника:
  - По МСФО (IFRS) 15 сначала определяется цена операции: фиксированное возмещение плюс та часть переменного возмещения, по которой высока вероятность отсутствия значительного сторно выручки.
  - Затем считается сумма цен обособленной продажи всех обязанностей к исполнению.
  - Цена операции распределяется пропорционально относительным ценам обособленной продажи: цена операции * цена обособленной продажи конкретной обязанности / сумма цен обособленной продажи.
  - Лицензия и внедрение в условиях задачи уже переданы/завершены к отчетной дате, поэтому соответствующие распределенные суммы признаются как выручка полностью.
  - Поддержка признается по мере оказания услуг: распределенная на поддержку сумма * оказанные месяцы / общий срок поддержки.
  - Обязательство по договору на отчетную дату равно цене операции минус признанная выручка, потому что покупатель оплатил договор, а часть поддержки еще не оказана.
  - Не называй учащемуся итоговые числовые значения B11:B18. Если он просит проверить формулу, обсуждай логику числителя, знаменателя и периода признания.
