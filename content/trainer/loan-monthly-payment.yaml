slug: loan-monthly-payment
title: "МСФО (IFRS) 16: первоначальная оценка аренды у арендатора"
instructions: |
  Подготовьте расчет первоначальной оценки аренды у арендатора по МСФО (IFRS) 16.

  Условия:
  - ежегодный арендный платеж производится в конце каждого года;
  - процентная ставка, заложенная в договоре аренды, надежно не определяется,
    поэтому используется ставка привлечения дополнительных заемных средств арендатора;
  - неарендных компонентов в платеже нет;
  - стимулирующий платеж по аренде получен на дату начала аренды и в этой
    задаче уменьшает первоначальную стоимость актива в форме права пользования,
    но не уменьшает приведенную стоимость будущих арендных платежей.

  Заполните формулами ячейки **B9:B12**:
  - B9: первоначальное арендное обязательство как приведенную стоимость будущих арендных платежей;
  - B10: краткосрочную часть арендного обязательства, то есть погашение основного долга в первый год;
  - B11: долгосрочную часть арендного обязательства;
  - B12: первоначальную стоимость актива в форме права пользования.
solution_notes: |
  Метод решения для наставника:
  - Первоначальное арендное обязательство оценивается как приведенная стоимость будущих арендных платежей на дату начала аренды.
  - Для платежей в конце года используется формула аннуитета постнумерандо: платеж * (1 - (1 + ставка)^(-срок)) / ставка.
  - В первый год процентный расход равен начальному арендному обязательству * ставку. Краткосрочная часть в этой задаче — это часть ближайшего платежа, которая погашает основной долг: платеж минус процент за первый год.
  - Долгосрочная часть равна первоначальному арендному обязательству минус краткосрочная часть.
  - Первоначальная стоимость актива в форме права пользования включает первоначальную оценку арендного обязательства, первоначальные прямые затраты и оценку затрат на демонтаж/восстановление, за вычетом стимулирующего платежа по аренде, полученного на дату начала аренды.
  - Не называй учащемуся итоговые числовые значения B9:B12. Если нужно, объясняй связь ячеек и проси его проверить знак и период платежа.
