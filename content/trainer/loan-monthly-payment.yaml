slug: loan-monthly-payment
title: Платёж по кредиту (аннуитет)
instructions: |
  В ячейке **B5** посчитайте ежемесячный аннуитетный платёж по кредиту,
  используя данные из B1–B3 и формулу:

      платёж = P * r * (1+r)^n / ((1+r)^n − 1)

  где P — сумма кредита (B1), r — месячная ставка (годовая / 12 / 100),
  n — срок в месяцах (B3). Ответ должен быть формулой, ссылающейся на B1–B3.
sheet:
  cells:
    A1: { value: "Сумма кредита" }
    B1: { value: 500000 }
    A2: { value: "Ставка годовых, %" }
    B2: { value: 12 }
    A3: { value: "Срок, мес." }
    B3: { value: 12 }
    A5: { value: "Платёж в месяц" }
    B5: { value: null }
editable: [B5]
hints:
  - "Месячная ставка = B2 / 12 / 100"
  - "Возведение в степень в формуле: (1+r)^n"
grading:
  rules:
    - cell: B5
      expected: 44424.36
      tolerance: { type: relative, value: 0.01 }
      must_be_formula: true
  xp: 10
