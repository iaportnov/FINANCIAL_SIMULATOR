slug: budgeting-quiz
title: "IFRS 16: аренда у арендатора"
pass_threshold: 0.8
questions:
  - type: single_choice
    prompt: Какой признак обязателен, чтобы договор содержал аренду по IFRS 16?
    options:
      - { id: 1, text: Покупатель получает контроль над использованием идентифицированного актива }
      - { id: 2, text: Договор всегда называется договором аренды }
      - { id: 3, text: Актив обязательно переходит в собственность покупателя в конце срока }
      - { id: 4, text: Поставщик всегда обязан обслуживать актив }
    correct: { option_ids: [1] }
    explanation: IFRS 16 смотрит на контроль использования идентифицированного актива, а не на юридическое название договора.

  - type: multiple_choice
    prompt: Какие суммы обычно входят в первоначальную оценку ROU asset у арендатора?
    options:
      - { id: 1, text: Первоначальная оценка lease liability }
      - { id: 2, text: Первоначальные прямые затраты арендатора }
      - { id: 3, text: Оценка затрат на демонтаж и восстановление }
      - { id: 4, text: Будущие переменные платежи, зависящие только от выручки арендатора }
    correct: { option_ids: [1, 2, 3] }
    explanation: Переменные платежи, зависящие от будущей выручки или использования, обычно признаются в P&L по мере возникновения, а не включаются в первоначальную оценку обязательства.

  - type: numeric
    prompt: "Lease liability на начало года 3 803 838,54; ставка 10%; платеж в конце года 1 200 000. Какова текущая часть обязательства после первого года, то есть погашение основного долга? Ответ округлите до целого."
    correct: { value: 819616, tolerance: { type: absolute, value: 1 } }
    explanation: Процент = 3 803 838,54 * 10% = 380 383,85; погашение основного долга = 1 200 000 - 380 383,85 = 819 616,15.

  - type: single_choice
    prompt: Какая ставка используется, если implicit rate по договору аренды нельзя надежно определить?
    options:
      - { id: 1, text: Incremental borrowing rate арендатора }
      - { id: 2, text: Средняя доходность капитала группы }
      - { id: 3, text: Безрисковая ставка центрального банка без корректировок }
      - { id: 4, text: Ставка налога на прибыль }
    correct: { option_ids: [1] }
    explanation: IFRS 16 требует использовать incremental borrowing rate арендатора, если implicit rate надежно не определяется.

  - type: multiple_choice
    prompt: Что уменьшает lease liability после первоначального признания?
    options:
      - { id: 1, text: Фактический арендный платеж }
      - { id: 2, text: Процентный расход по обязательству }
      - { id: 3, text: Переоценка из-за изменения индекса или ставки, если такое изменение применимо }
      - { id: 4, text: Амортизация ROU asset }
    correct: { option_ids: [1] }
    explanation: Процентный расход увеличивает обязательство, платеж уменьшает его. Амортизация ROU asset не уменьшает lease liability.
